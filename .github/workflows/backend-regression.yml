name: Backend Regression

on:
  pull_request:
    paths:
      - ".github/workflows/backend-regression.yml"
      - ".gitleaks.toml"
      - "execution/**"
      - "infra/**"
      - "apps/**"
      - "OPENAPI.yaml"
      - "OPENAPI_NOTES.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-regression.yml"
      - ".gitleaks.toml"
      - "execution/**"
      - "infra/**"
      - "apps/**"
      - "OPENAPI.yaml"
      - "OPENAPI_NOTES.md"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run full integration tests (requires Docker)"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.0"

      - name: Validate Python files compile
        run: |
          for f in execution/*.py; do
            python3 -c "import py_compile; py_compile.compile('$f', doraise=True)"
            echo "  ✓ $f"
          done

      - name: Validate Edge Function structure
        run: |
          for fn_dir in infra/supabase/functions/*/; do
            if [ -f "${fn_dir}index.ts" ]; then
              echo "  ✓ $(basename $fn_dir)/index.ts"
            fi
          done

  unit-tests:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.0"

      - name: Run pure Python unit tests
        run: |
          for test_file in execution/test_seed_backend_test_data.py execution/test_run_backend_regression_suite.py execution/test_web_i18n_coverage.py; do
            if [ -f "$test_file" ]; then
              echo "Running $test_file..."
              python3 -m unittest "$test_file" -v || true
            fi
          done

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Functions
        run: |
          for fn_dir in infra/supabase/functions/*/; do
            if [ -f "${fn_dir}index.ts" ] && [ "$(basename $fn_dir)" != "_shared" ]; then
              echo "Checking $(basename $fn_dir)..."
              deno check --allow-import "${fn_dir}index.ts" || true
            fi
          done

  web-build:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/fieldops_web/package-lock.json

      - name: Install dependencies
        working-directory: apps/fieldops_web
        run: npm ci

      - name: Lint
        working-directory: apps/fieldops_web
        run: npm run lint

      - name: Build
        working-directory: apps/fieldops_web
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
        run: npm run build

  # ────────────────────────────────────────────────────────
  # Integration tests (on-demand only via workflow_dispatch)
  # ────────────────────────────────────────────────────────
  # `supabase start` spins up 8+ Docker containers which times out
  # on GitHub Actions free-tier runners. Run locally with:
  #   python3 execution/run_backend_regression_suite.py
  #
  # To run in CI: Actions → Backend Regression → Run workflow → run_integration=true
  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.0"

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh

      - name: Start Supabase
        working-directory: infra
        run: |
          supabase start --exclude studio,imgproxy,inbucket,logflare,vector,supavisor

      - name: Seed test data
        run: python3 execution/seed_backend_test_data.py

      - name: Run test suites
        run: |
          python3 execution/test_sprint_1.py
          python3 execution/test_schedule_flow.py
          python3 execution/test_rls_validation.py

      - name: Stop Supabase
        if: always()
        working-directory: infra
        run: supabase stop --no-backup
