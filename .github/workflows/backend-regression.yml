name: Backend Regression

on:
  pull_request:
    paths:
      - ".github/workflows/backend-regression.yml"
      - ".gitleaks.toml"
      - "execution/**"
      - "infra/**"
      - "apps/**"
      - "OPENAPI.yaml"
      - "OPENAPI_NOTES.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-regression.yml"
      - ".gitleaks.toml"
      - "execution/**"
      - "infra/**"
      - "apps/**"
      - "OPENAPI.yaml"
      - "OPENAPI_NOTES.md"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Python files compile
        run: |
          for f in execution/*.py; do
            python3 -c "import py_compile; py_compile.compile('$f', doraise=True)"
            echo "  ✓ $f"
          done

      - name: Validate Edge Function structure
        run: |
          for fn_dir in infra/supabase/functions/*/; do
            if [ -f "${fn_dir}index.ts" ]; then
              echo "  ✓ $(basename $fn_dir)/index.ts"
            fi
          done

  # ────────────────────────────────────────────────────────
  # Backend integration tests (disabled — requires Docker)
  # ────────────────────────────────────────────────────────
  # `supabase start` spins up 8+ Docker containers (Postgres, GoTrue,
  # PostgREST, Edge Runtime, Storage, etc.) which consistently times
  # out on GitHub Actions free-tier ubuntu-latest runners (~73s).
  #
  # Run locally:  python3 execution/run_backend_regression_suite.py
  #
  # Sprint 7 fix options:
  #   1. Supabase Branching (hosted CI database — no Docker needed)
  #   2. Self-hosted runner with persistent Docker cache
  #   3. Split into unit tests (no Supabase) + integration tests (manual)
  #
  # Tracked: SPRINT_TRACKER.md → Sprint 7 → "Re-enable backend regression in CI"
