entrypoint = "./functions/galleries/index.ts"

# Sprint 8.7 gap-fill: every remaining user-auth + cron function must set
# verify_jwt = false so Kong's HS256-only gateway verifier stops rejecting
# ES256-signed user tokens. In-function `supabase.auth.getUser()` still
